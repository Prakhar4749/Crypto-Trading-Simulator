name: Deploy CoinDesk Backend to VM

on:
  push:
    branches:
      - main
    paths:
      - 'Backend/**'
  workflow_dispatch: # only trigger if Backend code changed

jobs:
  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest

    steps:
      - name: SSH into VM and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          timeout: 30m             # <--- UPDATED: Increased to 30 minutes
          command_timeout: 30m     # <--- UPDATED: Increased to 30 minutes
          script: |
            set -e

            REPO_ROOT="${{ secrets.VM_DEPLOY_PATH }}"
            # e.g. /root/c/coindesk

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  Pulling latest code..."
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            cd "$REPO_ROOT"
            git fetch origin main
            git reset --hard origin/main

            echo "  Running deploy script..."
            bash Backend/scripts/deploy.sh
