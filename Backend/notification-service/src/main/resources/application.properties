spring.config.import=optional:file:../.env[.properties]
server.port=${NOTIFICATION_PORT:5460}

spring.application.name=notification-service

spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:changeme}
spring.mail.password=${SMTP_PASSWORD:changeme}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=notification-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
internal.service.api.key=${INTERNAL_SERVICE_API_KEY:changeme}
notification.otp-expiry=${OTP_EXPIRY_MINUTES:10}

app.name=${APP_NAME:CoinDesk}
app.logo-url=${LOGO_URL:}
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

kafka.topic.otp=${KAFKA_TOPIC_OTP_NOTIFICATION}
kafka.topic.user-created=${KAFKA_TOPIC_USER_CREATED}
kafka.topic.trade=${KAFKA_TOPIC_TRADE_EXECUTED}
kafka.topic.withdrawal=${KAFKA_TOPIC_WITHDRAWAL_STATUS}

logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.prakhar=${LOG_LEVEL:INFO}

# DB Exclude
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
