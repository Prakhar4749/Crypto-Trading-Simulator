server.port=${AUTH_PORT}

spring.config.import=optional:file:../.env[.properties]
spring.application.name=auth-service

# Database & HikariCP (Optimized for Neon DB)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.validation-timeout=5000

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
# Removed spring.jpa.database-platform (Auto-detected)

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_URL}

# App-Specific Properties
jwt.secret=${JWT_SECRET}
otp.expiry-minutes=${OTP_EXPIRY_MINUTES:10}
admin.email=${ADMIN_EMAIL}
admin.password=${ADMIN_PASSWORD}
admin.fullName=${ADMIN_FULL_NAME:Admin}
internal.service.api.key=${INTERNAL_SERVICE_API_KEY}

# Security
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# Logging
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.prakhar=${LOG_LEVEL:INFO}