spring.config.import=optional:file:../.env[.properties]
server.port=${AUTH_PORT:5454}

spring.application.name=auth-service

# Database & HikariCP (Optimized for Neon DB)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost/trading}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.sql.init.mode=never

# HikariCP Settings for Neon (Lower connection limits)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=true

# Discovery
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}

# Security
jwt.secret=${JWT_SECRET:changeme}
INTERNAL_SERVICE_API_KEY=${INTERNAL_SERVICE_API_KEY:changeme}
internal.api-key=${INTERNAL_SERVICE_API_KEY:changeme}

# Business Logic
wallet.signup-bonus=${SIGNUP_BONUS_AMOUNT:10000}
simulator.exchange-rate=${SIMULATOR_EXCHANGE_RATE:10000}
frontend.url=${FRONTEND_URL:http://localhost:5173}

# Kafka Topics
kafka.topic.user-created=${KAFKA_TOPIC_USER_CREATED:user-created}
kafka.topic.otp-notification=${KAFKA_TOPIC_OTP_NOTIFICATION:otp-notification}

# Google OAuth2 (Ported from Monolith)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# Logging
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.prakhar=${LOG_LEVEL:INFO}
